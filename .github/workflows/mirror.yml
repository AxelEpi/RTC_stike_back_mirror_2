name: Mirror to Epitech

# Se déclenche à chaque push sur n'importe quelle branche
# C'est ce push qui va aussi envoyer le code vers le repo Epitech
on:
  push:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Mirror vers le repo Epitech
  # Copie tout le repo perso vers le repo Epitech
  # pour qu'Epitech voit toujours ton dernier code
  # ─────────────────────────────────────────────
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère TOUT l'historique git
                         # Sans ça le mirror serait incomplet

      - name: Push vers le repo Epitech
        run: |
          # Ajoute le repo Epitech comme remote "epitech"
          # EPITECH_TOKEN = ton Personal Access Token qui a accès au repo Epitech
          git remote add epitech https://x-access-token:${{ secrets.EPITECH_TOKEN }}@github.com/EpitechMscProPromo2028/T-DEV-600-MLN_1.git
          
          # Pousse absolument tout vers le repo Epitech :
          # - toutes les branches
          # - tous les tags
          # - tout l'historique git
          git push epitech --mirror
